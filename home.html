<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUCARE</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#0f2027,#000);
    color:white;
    overflow-x:hidden;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#00ffff;
}

.loader-logo{
    width:120px;
    margin-bottom:10px;
    animation:fadeIn 1s ease;
}

/* HEADER */
.header{
    position:sticky;
    top:0;
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 15px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    box-shadow:0 0 15px #00ffff40;
}

.header img{
    width:35px;
}

.header span{
    color:#00ffff;
    font-size:18px;
    font-weight:bold;
}

/* PARTICLE */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* CARDS */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    margin:15px;
    padding:18px;
    border-radius:18px;
    box-shadow:0 0 20px #00ffff20;
    animation:fadeUp 0.8s ease;
}

h2{
    color:#00ffff;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1;}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* FLOAT BUTTONS */
.icon-bar{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
}

.icon{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    animation:pulse 2s infinite;
}

.icon img{
    width:65%;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #00ffff;}
    50%{box-shadow:0 0 25px #00ffff;}
    100%{box-shadow:0 0 10px #00ffff;}
}

/* MOBILE */
@media(max-width:500px){
    .header span{font-size:16px;}
    .header img{width:30px;}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <img src="logo.png" class="loader-logo">
    <p>Loading EDUCARE...</p>
</div>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <span>EDUCARE</span>
</div>

<canvas id="particles"></canvas>

<!-- CONTENT -->
<div class="card">
<h2>Founder</h2>
<p><b>Rupak Chakraborty</b></p>
</div>

<div class="card">
<h2>Classes</h2>
<p>Class 5-7: All Subjects</p>
<p>Class 8-12: Arts + English</p>
</div>

<div class="card">
<h2>Courses</h2>
<p>Spoken English</p>
<p>Competitive Exams</p>
</div>

<div class="card">
<h2>Location</h2>
<p>45, Malancha Road, Garifa</p>
</div>

<div class="card">
<h2>Contact</h2>
<p>📞 9804413135</p>
</div>

<!-- FLOAT ICONS -->
<div class="icon-bar">

<a href="https://wa.me/918240358587" class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<a href="https://www.google.com/maps/search/?api=1&query=45+Malancha+Road+Garifa" class="icon">
<img src="map.png">
</a>

</div>

<script>
/* LOADER */
window.onload = function(){
    document.getElementById("loader").style.display="none";
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<40;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: (Math.random()-0.5)*0.4,
        dy: (Math.random()-0.5)*0.4
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#00ffff";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
