<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUCARE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to right,#0f2027,#000);
    color:white;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* HEADER */
.header{
    position:sticky;
    top:0;
    display:flex;
    gap:10px;
    padding:12px;
    background:rgba(0,0,0,0.7);
}
.header img{width:35px;}
.header span{color:#00ffff;font-weight:bold;}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    margin:15px auto;
    padding:18px;
    border-radius:15px;
    max-width:500px;
}

/* FORM */
input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#00ffff;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* 🔥 STYLISH CHECKBOX */
#subjectsBox{
    margin-top:10px;
}

.subject-btn{
    display:inline-block;
    padding:8px 12px;
    margin:5px;
    border-radius:20px;
    border:1px solid #00ffff;
    cursor:pointer;
}

.subject-btn input{
    display:none;
}

.subject-btn.active{
    background:#00ffff;
    color:black;
}

/* MOBILE */
@media (max-width:600px){
    .card{
        margin:10px;
    }
}
</style>
</head>

<body>

<div id="loader">Loading...</div>

<div class="header">
    <img src="logo.png">
    <span>EDUCARE</span>
</div>

<!-- INFO -->
<div class="card">
<h2>Founder</h2>
<p><b>Rupak Chakraborty</b></p>
</div>

<div class="card">
<h2>Location</h2>
<p>45 Malancha Road, Garifa</p>
</div>

<div class="card">
<h2>Courses</h2>
<p>Class 5-7: All Subjects</p>
<p>Class 8-12: Arts & English</p>
</div>

<!-- FORM -->
<div class="card">
<h2>Admission Form</h2>

<input id="name" placeholder="Your Name">

<select id="class" onchange="handleClass()">
<option value="">Select Class</option>
<option value="5-7">Class 5-7</option>
<option value="8-12">Class 8-12</option>
</select>

<select id="group" onchange="handleGroup()" style="display:none"></select>

<div id="subjectsBox" style="display:none;"></div>

<input id="phone" placeholder="Phone Number">

<button onclick="sendWhatsApp()">📲 Submit via WhatsApp</button>

</div>

<script>

/* LOADER */
window.onload = ()=> document.getElementById("loader").style.display="none";

/* CLASS */
function handleClass(){
    let cls = document.getElementById("class").value;
    let group = document.getElementById("group");
    let box = document.getElementById("subjectsBox");

    group.style.display="none";
    box.style.display="none";

    if(cls==="5-7"){
        box.style.display="block";
        box.innerHTML = createSubjects([
            "BNG","ENG","MATH","GEO","SCIENCE","HIST","SANSKRIT"
        ]);
    }

    if(cls==="8-12"){
        group.style.display="block";
        group.innerHTML = `
        <option value="">Select Group</option>
        <option value="Arts">Arts</option>
        <option value="English">English</option>`;
    }
}

/* GROUP */
function handleGroup(){
    let group = document.getElementById("group").value;
    let box = document.getElementById("subjectsBox");

    box.style.display="block";

    if(group==="English"){
        box.style.display="none";
    }

    if(group==="Arts"){
        box.innerHTML = createSubjects(["GEO","HIST","BNG"]);
    }
}

/* 🔥 CREATE STYLISH CHECKBOX */
function createSubjects(arr){
    return arr.map(i=>`
        <label class="subject-btn">
            <input type="checkbox" value="${i}" onclick="toggleBtn(this)">
            ${i}
        </label>
    `).join("");
}

/* ACTIVE TOGGLE */
function toggleBtn(el){
    el.parentElement.classList.toggle("active");
}

/* GET SUBJECT */
function getSubjects(){
    let checked = document.querySelectorAll("#subjectsBox input:checked");
    let list = [];
    checked.forEach(c=>list.push(c.value));
    return list.join(", ");
}

/* WHATSAPP */
function sendWhatsApp(){
    let name = document.getElementById("name").value.trim();
    let cls = document.getElementById("class").value;
    let group = document.getElementById("group").value;
    let subjects = getSubjects();
    let phone = document.getElementById("phone").value.trim();

    if(name==="" || cls==="" || phone===""){
        alert("Fill all details!");
        return;
    }

    if(cls==="5-7" && subjects===""){
        alert("Select subjects!");
        return;
    }

    if(cls==="8-12" && group===""){
        alert("Select group!");
        return;
    }

    let msg = `📚 New Admission
Name: ${name}
Class: ${cls}
Group: ${group}
Subjects: ${subjects}
Phone: ${phone}`;

    let url = "https://api.whatsapp.com/send?phone=918240358587&text=" + encodeURIComponent(msg);

    window.open(url, "_self");
}

</script>

</body>
</html>
