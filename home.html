<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUCARE</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#0f2027,#000);
    color:white;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#00ffff;
}
.loader-logo{
    width:120px;
    animation:zoomIn 1s ease;
}
@keyframes zoomIn{
    from{transform:scale(0.5); opacity:0;}
    to{transform:scale(1);}
}

/* HEADER */
.header{
    position:sticky;
    top:0;
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
}
.header img{width:35px;}
.header span{color:#00ffff;font-weight:bold;}

/* HERO */
.hero{
    text-align:center;
    padding:40px 20px;
}
.hero img{width:150px;}
.hero h1{text-shadow:0 0 10px #00ffff;}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    margin:15px auto;
    padding:18px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    max-width:500px;
}
h2{color:#00ffff;}

/* FORM */
input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#00ffff;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* FLOAT BUTTONS */
.icon-bar{
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
}
.icon{
    width:55px;
    height:55px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    display:flex;
    justify-content:center;
    align-items:center;
}
.icon img{width:60%;}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <img src="logo.png" class="loader-logo">
    <p>Loading EDUCARE...</p>
</div>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <span>EDUCARE</span>
</div>

<canvas id="particles"></canvas>

<!-- HERO -->
<div class="hero">
    <img src="logo.png">
    <h1>Premium Tuition Classes</h1>
    <p>Learn Smart • Score High</p>
</div>

<!-- CONTENT -->
<div class="card">
<h2>Founder</h2>
<p><b>Rupak Chakraborty</b></p>
</div>

<div class="card">
<h2>Classes</h2>
<p>Class 5-7: All Subjects</p>
<p>Class 8-12: Arts + English</p>
</div>

<!-- FORM -->
<div class="card">
<h2>Admission Form</h2>

<input id="name" placeholder="Your Name">

<select id="class" onchange="handleClass()">
<option value="">Select Class</option>
<option value="5-7">Class 5-7</option>
<option value="8-12">Class 8-12</option>
</select>

<select id="group" onchange="handleGroup()" style="display:none"></select>

<select id="subject" style="display:none"></select>

<input id="phone" placeholder="Phone Number">

<button onclick="sendWhatsApp()">📲 Submit via WhatsApp</button>

</div>

<!-- FLOAT ICONS -->
<div class="icon-bar">
<a href="https://wa.me/918240358587" class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<a href="https://www.google.com/maps/search/?api=1&query=45+Malancha+Road+Garifa" class="icon">
<img src="map.png">
</a>
</div>

<script>

/* LOADER */
window.onload = ()=> {
    document.getElementById("loader").style.display="none";
}

/* CLASS LOGIC */
function handleClass(){
    let cls = document.getElementById("class").value;
    let group = document.getElementById("group");
    let subject = document.getElementById("subject");

    group.style.display="none";
    subject.style.display="none";

    if(cls==="5-7"){
        subject.style.display="block";
        subject.innerHTML = `
        <option>BNG</option>
        <option>ENG</option>
        <option>MATH</option>
        <option>GEO</option>
        <option>SCIENCE</option>
        <option>HIST</option>
        <option>SANSKRIT</option>`;
    }

    if(cls==="8-12"){
        group.style.display="block";
        group.innerHTML = `
        <option value="">Select Group</option>
        <option value="Arts">Arts</option>
        <option value="English">English</option>`;
    }
}

/* GROUP LOGIC */
function handleGroup(){
    let group = document.getElementById("group").value;
    let subject = document.getElementById("subject");

    subject.style.display="block";

    if(group==="English"){
        subject.innerHTML = `<option>English</option>`;
    }

    if(group==="Arts"){
        subject.innerHTML = `
        <option>GEO</option>
        <option>HIST</option>
        <option>BNG</option>`;
    }
}

/* WHATSAPP FIX */
function sendWhatsApp(){
    let name = document.getElementById("name").value.trim();
    let cls = document.getElementById("class").value;
    let group = document.getElementById("group").value;
    let subject = document.getElementById("subject").value;
    let phone = document.getElementById("phone").value.trim();

    if(name==="" || cls==="" || phone===""){
        alert("Fill all details!");
        return;
    }

    let msg = `New Admission:
Name: ${name}
Class: ${cls}
Group: ${group}
Subject: ${subject}
Phone: ${phone}`;

    let url = `https://api.whatsapp.com/send?phone=918240358587&text=${encodeURIComponent(msg)}`;

    window.location.href = url;
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<50;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5)*0.4,
        dy:(Math.random()-0.5)*0.4
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#00ffff";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
