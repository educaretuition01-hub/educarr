<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUCARE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to right,#0f2027,#000);
    color:white;
    overflow-x:hidden;
}

/* LOADING SCREEN */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#00ffff;
    font-size:22px;
}

/* HEADER */
.header{
    position:sticky;
    top:0;
    background:#000;
    padding:15px;
    text-align:center;
    font-size:20px;
    color:#00ffff;
    box-shadow:0 0 10px #00ffff;
}

/* Particle */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Cards */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #00ffff30;
    animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1;}
}

h2{
    color:#00ffff;
}

/* ICONS */
.icon-bar{
    position:fixed;
    bottom:70px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:25px;
}

.icon{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #00ffff;}
    50%{box-shadow:0 0 25px #00ffff;}
    100%{box-shadow:0 0 10px #00ffff;}
}

.icon img{
    width:70%;
}

/* NAVBAR */
.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    box-shadow:0 0 10px #00ffff;
}

.navbar a{
    color:#00ffff;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading EDUCARE...</div>

<div class="header">📚 EDUCARE Tuition</div>

<canvas id="particles"></canvas>

<div class="card">
<h2>Founder</h2>
<p><b>Rupak Chakraborty</b></p>
</div>

<div class="card">
<h2>Classes</h2>
<p>Class 5-7: All Subjects</p>
<p>Class 8-12: Arts + English</p>
</div>

<div class="card">
<h2>Courses</h2>
<p>Spoken English</p>
<p>Competitive Exams</p>
</div>

<div class="card">
<h2>Location</h2>
<p>45, Malancha Road, Garifa</p>
</div>

<div class="card">
<h2>Contact</h2>
<p>📞 9804413135</p>
</div>

<!-- ICONS -->
<div class="icon-bar">

<a href="https://wa.me/918240358587" class="icon">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<a href="https://www.google.com/maps/search/?api=1&query=45+Malancha+Road+Garifa" class="icon">
<img src="map.png"> <!-- YOUR IMAGE -->
</a>

</div>

<!-- NAVBAR -->
<div class="navbar">
<a href="#">🏠 Home</a>
<a href="#">📞 Contact</a>
<a href="#">📍 Location</a>
</div>

<script>
/* LOADER */
window.onload = function(){
    document.getElementById("loader").style.display="none";
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<25;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: (Math.random()-0.5)*0.3,
        dy: (Math.random()-0.5)*0.3
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#00ffff";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
